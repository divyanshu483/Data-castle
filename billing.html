<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Areex Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        /* CORE STYLES */
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{--blue:#1400ff;--blue2:#0040ff;--blue3:#0088ff;--cyan:#00ccff;--dark:#06060e;--dark2:#09091a;--card:#0f0f24;--card2:#13132c;--border:#1e1e45;--border2:#28285a;--text:#c8ceff;--muted:#5a5a9a;--green:#00ff88;--yellow:#ffdd00;--red:#ff6060;}
        body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif; min-height: 100vh; overflow-x: hidden;}
        
        nav{position:sticky;top:0;z-index:999;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:64px;background:rgba(6,6,14,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);}
        .logo-name{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

        /* LAYOUT */
        .billing-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 24px;
            align-items: start;
        }

        /* EXACT PRICING CARD STYLES */
        .game-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden; width: 100%; display: flex; flex-direction: column; min-height: 500px;}
        .gc-banner{height:220px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
        .gc-emoji{font-size:6.5rem;z-index:1;position:relative;filter:drop-shadow(0 4px 25px rgba(0,0,0,.6));}
        .gc-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(9,9,26,.98) 100%);z-index:2;}
        .gc-tag{position:absolute;top:15px;left:15px;z-index:10;font-size:9px;font-weight:800;padding:4px 12px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;}
        .tag-pop{background:rgba(255,50,50,.14);color:var(--red);border:1px solid rgba(255,50,50,.28);}
        .tag-hot{background:rgba(255,140,0,.14);color:#ffaa55;border:1px solid rgba(255,140,0,.28);}
        .tag-new{background:rgba(0,200,255,.1);color:var(--cyan);border:1px solid rgba(0,200,255,.22);}
        
        .gc-body{padding:24px; flex-grow: 1; display: flex; flex-direction: column;}
        .gc-name{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;color:#fff;letter-spacing:.8px;}
        .gc-desc{font-size:13.5px;color:var(--muted);line-height:1.6;margin:10px 0 20px;}
        .gc-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
        .gc-meta-pill{font-size:10.5px;padding:4px 12px;border-radius:8px;font-weight:600;background:rgba(20,0,255,.1);border:1px solid rgba(20,0,255,.2);color:var(--cyan);}
        
        /* CARD FOOTER (Price & RAM) */
        .gc-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: flex-end; padding-top: 20px; border-top: 1px solid var(--border); }
        .gc-price { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 800; color: var(--cyan); line-height: 1; }
        .gc-price span { font-size: 14px; color: var(--muted); font-weight: 400; }
        .gc-subtext { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* GRADIENTS */
        .bg-mc{background:linear-gradient(135deg,#0a1a08,rgba(30,100,20,.4));}
        .bg-rust{background:linear-gradient(135deg,#1a0800,rgba(100,40,10,.4));}
        .bg-fivem{background:linear-gradient(135deg,#0d0d18,rgba(20,0,100,.3));}
        .bg-ark{background:linear-gradient(135deg,#080f1a,rgba(20,60,100,.4));}

        /* CHECKOUT CARD */
        .checkout-card { background: var(--card2); border: 1px solid var(--border2); border-radius: 20px; padding: 30px; height: fit-content; box-shadow: 0 25px 60px rgba(0,0,0,0.4); }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .total-row { border-top: 1px solid var(--border); margin-top: 20px; padding-top: 20px; font-weight: 700; font-size: 1.4rem; color: var(--cyan); font-family: 'Rajdhani'; }
        
        .coupon-wrap { margin-top: 25px; position: relative; }
        .coupon-input { width: 100%; padding: 14px 15px; background: var(--dark); border: 1px solid var(--border2); border-radius: 10px; color: #fff; outline: none; transition: 0.3s; }
        .coupon-input:focus { border-color: var(--blue); }
        .coupon-btn { position: absolute; right: 6px; top: 6px; padding: 8px 16px; background: var(--blue); border: none; border-radius: 6px; color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; }

        .pay-btn { width: 100%; margin-top: 25px; padding: 18px; background: linear-gradient(135deg, var(--blue), var(--blue2)); color: #fff; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; box-shadow: 0 10px 25px rgba(20,0,255,0.3); transition: 0.3s; }
        .pay-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(20,0,255,0.5); }

        @media(max-width: 850px) { .billing-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo-wrap" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
        <img src="https://i.pinimg.com/736x/2c/bd/ac/2cbdacaeccf3c913c2ba91dcb2e63046.jpg" 
             alt="Logo" 
             style="height: 38px; width: 38px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border2);">
        <span class="logo-name">Areex Cloud</span>
    </a>
    <div class="nav-right">
        <a href="games.html" style="font-size: 12px; color: var(--muted); text-decoration: none; transition: 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--muted)'">
            ← Back to Plans
        </a>
    </div>
</nav>

<div class="billing-container">
    <div id="dynamicCardContainer">
        </div>

    <div class="checkout-card">
        <h3 style="margin-bottom: 25px; font-family: 'Rajdhani'; text-transform: uppercase; letter-spacing: 1px;">Order Summary</h3>
        
        <div class="price-row">
            <span>Base Price</span>
            <span id="basePrice">₹0</span>
        </div>
        <div class="price-row" id="discountRow" style="display: none; color: var(--green);">
            <span>Discount (AREEX10)</span>
            <span id="discountAmt">-₹0</span>
        </div>
        <div class="price-row">
            <span>Tax (GST 18%)</span>
            <span id="gstAmt">₹0</span>
        </div>

        <div class="price-row total-row">
            <span>Grand Total</span>
            <span id="totalPrice">₹0</span>
        </div>

        <div class="coupon-wrap">
            <input type="text" id="couponInput" class="coupon-input" placeholder="Enter Coupon Code">
            <button class="coupon-btn" onclick="applyCoupon()">Apply</button>
        </div>
        <p id="couponMsg" style="font-size: 11px; margin-top: 10px; font-weight: 500;"></p>
        <input type="email" id="userEmail" class="coupon-input" placeholder="Enter your email" required>
        <button class="pay-btn" onclick="openRazorpay()">Proceed to Pay</button>
        
        <p style="text-align: center; font-size: 11px; color: var(--muted); margin-top: 20px;">
            Secure Encrypted Checkout <br> Powered by Razorpay
        </p>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const game = urlParams.get('game') || 'Minecraft';

    const gameData = {
        'Trial': { price: 0.1, emoji: '⛏️', bg: 'bg-mc', tag: 'tag-pop', tagText: '⭐ #1 Popular', desc: 'The world\'s #1 game. Run Vanilla, Spigot, Paper, Forge, Fabric, or any modpack.', pills: ['Unlimited Slots', '1-Click Mods'] },
        'Micro Vps': { price: 299, emoji: '🗄️', bg: 'bg-mc', tag: 'tag-pop', tagText: '⭐ #1 Popular', desc: 'The world\'s #1 game. Run Vanilla, Spigot, Paper, Forge, Fabric, or any modpack.', pills: ['Unlimited Slots', '1-Click Mods'] },
        'Nano': { price: 29, emoji: '🔫', bg: 'bg-rust', tag: 'tag-hot', tagText: '🔥 Hot', desc: 'Survive, build, raid. Run vanilla or modded Rust servers.', pills: ['500 Players', 'Oxide/uMod'] },
        'Macro Vps': { price: 400, emoji: '🖥️', bg: 'bg-rust', tag: 'tag-hot', tagText: '🔥 Hot', desc: 'Survive, build, raid. Run vanilla or modded Rust servers.', pills: ['500 Players', 'Oxide/uMod'] },
        'Micro': { price: 49, emoji: '🏙️', bg: 'bg-fivem', tag: 'tag-new', tagText: '✨ New', desc: 'Run a GTA V roleplay server with txAdmin panel.', pills: ['512 Players', 'ESX / QBCore'] },
        'Large Vps': { price: 987, emoji: '🖥', bg: 'bg-fivem', tag: 'tag-new', tagText: '✨ New', desc: 'Run a GTA V roleplay server with txAdmin panel.', pills: ['512 Players', 'ESX / QBCore'] },
        'Mini': { price: 79, emoji: '🏙️', bg: 'bg-fivem', tag: 'tag-new', tagText: '✨ New', desc: 'Run a GTA V roleplay server with txAdmin panel.', pills: ['512 Players', 'ESX / QBCore'] },
        'Standard': { price: 99, emoji: '🏙️', bg: 'bg-fivem', tag: 'tag-new', tagText: '✨ New', desc: 'Run a GTA V roleplay server with txAdmin panel.', pills: ['512 Players', 'ESX / QBCore'] },
        'Max': { price: 1499, emoji: '🏙️', bg: 'bg-fivem', tag: 'tag-new', tagText: '✨ New', desc: 'Run a GTA V roleplay server with txAdmin panel.', pills: ['512 Players', 'ESX / QBCore'] },
        'Sudopodia': { price: 249, emoji: '🦕', bg: 'bg-ark', tag: '', tagText: '', desc: 'Tame dinosaurs and build bases on the ARK.', pills: ['All Maps', 'Workshop'] }
    };

    let selected = gameData[game] || gameData['Minecraft'];
    let discount = 0;

    function render() {
        // 1. Render Left Side (Exact Pricing Card)
        document.getElementById('dynamicCardContainer').innerHTML = `
            <div class="game-card">
                <div class="gc-banner ${selected.bg}">
                    ${selected.tag ? `<div class="gc-tag ${selected.tag}">${selected.tagText}</div>` : ''}
                    <div class="gc-emoji">${selected.emoji}</div>
                </div>
                <div class="gc-body">
                    <div>
                        <div class="gc-name">${game.toUpperCase()}</div>
                        <div class="gc-desc">${selected.desc}</div>
                        <div class="gc-meta">
                            ${selected.pills.map(p => `<span class="gc-meta-pill">${p}</span>`).join('')}
                            <span class="gc-meta-pill">Java & Bedrock</span>
                        </div>
                    </div>
                    
                    <div class="gc-footer">
                        <div class="gc-price-wrap">
                            <div class="gc-price">₹${selected.price}<span>/mo</span></div>
                            <div class="gc-subtext">Starting from 2GB RAM</div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // 2. Update Right Side Calculation
        const sub = selected.price;
        const gst = (sub - discount) * 0.18;
        const total = (sub - discount) + gst;

        document.getElementById('basePrice').innerText = `₹${sub}`;
        document.getElementById('gstAmt').innerText = `₹${gst.toFixed(2)}`;
        document.getElementById('totalPrice').innerText = `₹${total.toFixed(2)}`;
        
        if(discount > 0) {
            document.getElementById('discountRow').style.display = 'flex';
            document.getElementById('discountAmt').innerText = `-₹${discount.toFixed(2)}`;
        }
    }

    function applyCoupon() {
        const code = document.getElementById('couponInput').value.trim();
        const msg = document.getElementById('couponMsg');
        if (code === "AREEX10") {
            discount = selected.price * 0.10;
            msg.innerText = "COUPON APPLIED: 10% OFF SUCCESSFUL";
            msg.style.color = "var(--green)";
            render();
        } else {
            msg.innerText = "INVALID COUPON CODE";
            msg.style.color = "var(--red)";
        }
    }

    function openRazorpay() {
    const email = document.getElementById("userEmail").value;

    if (!email) {
        alert("Please enter your email");
        return;
    }

    const finalAmt = parseFloat(document.getElementById('totalPrice').innerText.replace('₹', ''));

    var options = {
        "key": "rzp_live_SeYO7rcBN9pXX8",
        "amount": (finalAmt * 100).toFixed(0),
        "currency": "INR",
        "name": "Areex Cloud",
        "description": "Payment for " + game + " Plan",
        "image": "https://i.pinimg.com/736x/2c/bd/ac/2cbdacaeccf3c913c2ba91dcb2e63046.jpg",

        "handler": function (response){
            alert("Payment Successful!");
        },

        "prefill": {
            "name": "Customer",
            "email": email   // ✅ dynamic email
        },

        "notes": {
            "email": email,  // ✅ VERY IMPORTANT (goes to webhook)
            "plan": game
        },

        "theme": { "color": "#1400ff" }
    };

    new Razorpay(options).open();
}

    render();
</script>
<script>
    // 1. Disable Right-Click
    document.addEventListener('contextmenu', (e) => e.preventDefault());

    // 2. Disable Keyboard Shortcuts for Inspect Element
    document.onkeydown = function(e) {
        // Disable F12
        if(event.keyCode == 123) {
            return false;
        }
        // Disable Ctrl+Shift+I (Inspect)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
            return false;
        }
        // Disable Ctrl+Shift+C (Inspect Element)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) {
            return false;
        }
        // Disable Ctrl+Shift+J (Console)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
            return false;
        }
        // Disable Ctrl+U (View Source)
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
            return false;
        }
    };
</script>
</body>
</html>
